name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Build
        uses: gradle/gradle-build-action@v3
        with:
          arguments: build

      - name: Publish package
        uses: gradle/gradle-build-action@v3
        with:
          arguments: publish
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}

      - name: Extract version
        id: version
        run: echo "version=$(grep '^version' build.gradle.kts | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          # Use the tag if it exists, otherwise use HEAD
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            END_REF="$TAG"
          else
            END_REF="HEAD"
          fi
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "$TAG" | head -1)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "$PREV_TAG".."$END_REF" --pretty=format:"- %s")
          else
            LOG=$(git log --pretty=format:"- %s" "$END_REF")
          fi
          {
            echo "body<<EOFNOTES"
            echo "## What's Changed"
            echo ""
            echo "$LOG"
            echo "EOFNOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: ${{ steps.notes.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            api/build/libs/api-*.jar
            paper/build/libs/*-all.jar
            velocity/build/libs/*-all.jar
